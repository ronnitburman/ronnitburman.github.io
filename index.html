<html lang="en">
<head>

  <style>
    :root {
      --bg: #1a1b26; --sidebar-bg: #16161e; --tab-active: #1a1b26;
      --tab-inactive: #121219; --statusbar: #0f0f16; --border: #2a2b3d;
      --text: #c0caf5; --muted: #565f89; --line-num: #3b4261;
      --cursor: #c0caf5;
      --kw: #bb9af7; --ty: #7aa2f7; --fn: #e0af68;
      --st: #9ece6a; --nu: #ff9e64; --cm: #565f89;
      --lit: #73daca; --accent: #7aa2f7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Menlo', 'Consolas', monospace;
      background: var(--bg); color: var(--text); display: flex;
      min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden;
    }
    a { color: var(--accent); text-decoration: none; }

    /* Sidebar */
    .sidebar {
      width: 220px; min-width: 220px; background: var(--sidebar-bg);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      font-size: 0.78rem; user-select: none; padding-top: 0.5rem;
    }
    .sidebar-header { padding: 0.7rem 1rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.66rem; }
    .sidebar-file {
      padding: 0.45rem 1rem; cursor: pointer; color: var(--muted); transition: 0.15s;
      display: flex; align-items: center; gap: 0.5rem; border-left: 2px solid transparent;
    }
    .sidebar-file:hover { background: rgba(255,255,255,0.02); color: var(--text); }
    .sidebar-file.active { background: rgba(122,162,247,0.06); color: var(--accent); border-left-color: var(--accent); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Tabs */
    .tabs { display: flex; background: #121219; border-bottom: 1px solid var(--border); font-size: 0.74rem; overflow-x: auto; }
    .tab {
      padding: 0.5rem 1.2rem; cursor: pointer; color: var(--muted);
      border-right: 1px solid var(--border); white-space: nowrap;
      display: flex; align-items: center; gap: 0.4rem; transition: 0.15s;
    }
    .tab:hover { background: rgba(255,255,255,0.02); }
    .tab.active { background: var(--tab-active); color: var(--text); border-bottom: 2px solid var(--accent); margin-bottom: -1px; }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-ts { background: #7aa2f7; } .dot-json { background: #e0af68; } .dot-md { background: #9ece6a; }

    /* Flow hint arrow */
    .flow-hint {
      display: flex; align-items: center; justify-content: center;
      padding: 0.35rem; font-size: 0.7rem; color: var(--accent);
      background: rgba(122,162,247,0.04); border-bottom: 1px solid var(--border);
      cursor: pointer; transition: 0.2s; gap: 0.4rem;
    }
    .flow-hint:hover { background: rgba(122,162,247,0.08); }

    /* Editor */
    .editor { flex: 1; display: flex; overflow-y: auto; font-size: 0.82rem; line-height: 1.7; }
    .line-numbers { padding: 0.9rem 0; text-align: right; color: var(--line-num); user-select: none; min-width: 42px; font-size: 0.76rem; }
    .line-numbers div { padding: 0 0.6rem 0 0.4rem; }
    .code { padding: 0.9rem 1.5rem; flex: 1; overflow-x: auto; }
    .code br { content: ''; display: block; margin-bottom: 0; }

    /* Syntax colors */
    .kw { color: var(--kw); font-weight: 600; }
    .ty { color: var(--ty); font-weight: 600; }
    .fn { color: var(--fn); }
    .st { color: var(--st); }
    .nu { color: var(--nu); }
    .cm { color: var(--cm); font-style: italic; }
    .lit { color: var(--lit); }
    .highlight { background: rgba(122,162,247,0.1); padding: 0.1rem 0; border-left: 2px solid var(--accent); padding-left: 0.5rem; margin-left: -0.5rem; display: inline-block; width: 100%; }

    /* Cursor */
    .cursor {
      display: inline-block; width: 8px; height: 1.15em; background: var(--cursor);
      vertical-align: text-bottom; margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Status bar */
    .statusbar {
      background: var(--statusbar); border-top: 1px solid var(--border);
      padding: 0.3rem 1rem; display: flex; justify-content: space-between;
      font-size: 0.68rem; color: var(--muted);
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #1a1b26; padding: 0.5rem 1.2rem;
      border-radius: 6px; font-size: 0.78rem; font-weight: 600;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    /* Glow */
    .bg-glow {
      position: fixed; pointer-events: none; z-index: 0;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(122,162,247,0.03) 0%, transparent 70%);
      animation: float 10s ease-in-out infinite;
    }
    .bg-glow:nth-child(1) { top: -150px; left: -150px; }
    .bg-glow:nth-child(2) { bottom: -150px; right: -150px; animation-delay: -5s; }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(40px,-40px) scale(1.06); }
      66% { transform: translate(-30px,30px) scale(0.94); }
    }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { display: none; }
      .code { padding: 0.7rem 0.7rem; }
      .editor { font-size: 0.7rem; }
    }
  </style>
</head>

        <span class="ty">impact</span>:  [
          <span class="highlight"><span class="st">"Led sustainability recommender — optimized PSU utilization across enterprise hardware"</span></span>,
          <span class="st">"Architected network automation for IOS-XE devices — <span class="nu">cut latency 40%</span>"</span>,
          <span class="st">"Built diagnostic engine for Catalyst 9K security hardening & auto-remediation"</span>,

        ]
      },

        <span class="ty">period</span>:  <span class="st">"Jun 2022 – Feb 2023"</span>,
        <span class="ty">impact</span>:  [
          <span class="st">"Python + PostgreSQL pipelines for <span class="kw">real-time edge analytics</span>"</span>,
          <span class="st">"Analyzed <span class="nu">50GB+</span> IoT telemetry with Pandas & BigQuery"</span>
        ]
      },
      {
        <span class="ty">role</span>:    <span class="st">"Graduate TA — Digital Systems Design"</span>,
        <span class="ty">company</span>: <span class="st">"University of Waterloo"</span>,
        <span class="ty">period</span>:  <span class="st">"Jan 2022 – Aug 2022"</span>,

        ]

      {

        <span class="ty">company</span>: <span class="st">"Johnson Controls, New York"</span>,
        <span class="ty">period</span>:  <span class="st">"Jul 2016 – Sep 2021"</span>,
        <span class="ty">impact</span>:  [
          <span class="highlight"><span class="st">"Invented Digital Integration Module — <span class="kw">patent filed</span>"</span></span>,
          <span class="st">"R2R bridge architecture — <span class="nu">slashed wiring costs 70%</span>"</span>,

  <span class="ty">education</span> = [
    { <span class="ty">degree</span>: <span class="st">"M.Eng Systems Design — AI & ML"</span>, <span class="ty">school</span>: <span class="st">"University of Waterloo"</span>, <span class="ty">year</span>: <span class="nu">2022</span> },
    { <span class="ty">degree</span>: <span class="st">"B.Tech Electronics & Instrumentation"</span>, <span class="ty">school</span>: <span class="st">"VIT"</span>, <span class="ty">year</span>: <span class="nu">2016</span> }

      },

      skills: {
        label: 'JSON',
        html: `{
  <span class="ty">"languages"</span>:  [<span class="st">"Python"</span>, <span class="st">"Bash"</span>, <span class="st">"SQL"</span>],

  <span class="ty">"infra"</span>:      [<span class="st">"Docker"</span>, <span class="st">"Kubernetes"</span>, <span class="st">"AWS"</span>,
                 <span class="st">"PostgreSQL"</span>, <span class="st">"CI/CD"</span>, <span class="st">"Git"</span>],

  <span class="ty">"embedded"</span>:   [<span class="st">"Linux"</span>, <span class="st">"Arduino"</span>, <span class="st">"Raspberry Pi"</span>,
                 <span class="st">"ESP32"</span>, <span class="st">"ATmega32"</span>,
                 <span class="st">"UART"</span>, <span class="st">"I²C"</span>, <span class="st">"SPI"</span>,
                 <span class="st">"RS-232"</span>, <span class="st">"JTAG"</span>],

  <span class="ty">"engineering"</span>: [<span class="st">"MATLAB Simulink"</span>, <span class="st">"Cadence"</span>,
                 <span class="st">"P-SIM"</span>, <span class="st">"Schematics"</span>,
                 <span class="st">"ADCs / DACs"</span>, <span class="st">"Remote Debugging"</span>,
                 <span class="st">"Bit Masking"</span>, <span class="st">"IoT Telemetry"</span>],

  <span class="cm">"_note"</span>: <span class="st">"Hardware registers → cloud containers. Since 2016."</span>
}`
      },

      awards: {
        label: 'Markdown',
        html: `<span class="cm">&lt;!-- Leadership &amp; Awards --&gt;</span>

<span class="kw">##</span> <span class="fn">🏆 Founder & Captain — Hybrid Formula Student Team</span> <span class="cm">(2013–2015)</span>

housings, brake lights, safety circuits &amp; wireless charging —
<span class="highlight">years ahead of mainstream EV adoption.</span>

machines to <span class="kw">save lives</span> during hospital power outages.

Systems Design Engineering, University of Waterloo.

<span class="kw">##</span> <span class="fn">🏅 Dean's Award</span> — Extraordinary Performance, VIT`
      },

      contact: {
        label: 'TypeScript',
        html: `<span class="kw">import</span> { <span class="ty">connect</span> } <span class="kw">from</span> <span class="st">'@ronnit/inbox'</span>;

<span class="kw">const</span> <span class="fn">ronnit</span> = <span class="kw">new</span> <span class="ty">Engineer</span>({
  <span class="ty">email</span>:     <a href="mailto:ronnitburman@gmail.com"><span class="st">"ronnitburman@gmail.com"</span></a>,

  <span class="ty">location</span>:  <span class="st">"Ottawa, ON"</span>,
  <span class="ty">available</span>: <span class="kw">true</span>
});

<span class="cm">// Open to: software systems, HW-SW integration, AI/ML</span>
<span class="cm">// Let's build something that spans the stack.</span>

<span class="kw">await</span> <span class="fn">connect</span>(ronnit);
<span class="cm">// → Response time: &lt; 24h</span>`
      }
    };

    const tabOrder = ['class', 'skills', 'awards', 'contact'];
    let activeTab = 'class';
    let typingTimer = null;
    let skipRequested = false;

    const codeEl = document.getElementById('code-content');
    const lineNums = document.getElementById('line-numbers');
    const lnCol = document.getElementById('ln-col');
    const fileType = document.getElementById('file-type');
    const flowHint = document.getElementById('flow-hint');
    const flowArrow = document.getElementById('flow-arrow');
    const flowLabel = document.getElementById('flow-label');
    const toast = document.getElementById('toast');
    const editor = document.getElementById('editor');

    function updateLines() {
      const lines = (codeEl.innerText.match(/\n/g) || []).length + 1;
      let h = '';
      for (let i = 1; i <= Math.max(lines, 1); i++) h += `<div>${i}</div>`;
      lineNums.innerHTML = h;
      const t = codeEl.innerText;
      const last = t.lastIndexOf('\n');
      const col = last === -1 ? t.length + 1 : t.length - last;
      lnCol.textContent = `${lines}, ${col}`;
    }

    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function updateFlowHint() {
      const idx = tabOrder.indexOf(activeTab);
      if (idx < tabOrder.length - 1) {
        const next = tabs[tabOrder[idx + 1]];
        flowLabel.textContent = `Next: ${next.label}`;
        flowArrow.textContent = '→';
        flowHint.style.display = 'flex';
      } else {
        flowLabel.textContent = 'You reached the end 👋';
        flowArrow.textContent = '✓';
        flowHint.style.display = 'flex';
      }
    }

    function typewrite(html) {
      clearTimeout(typingTimer);
      skipRequested = false;
      codeEl.innerHTML = '';
      updateLines();

      // Tokenize: split into atoms — either a full HTML tag+content or a single char
      const atoms = [];
      const regex = /(<[^>]+>[^<]*<\/[^>]+>)|(<[^>]+>)|([^<])/g;
      let m;
      while ((m = regex.exec(html)) !== null) {
        if (m[1]) atoms.push({ t: 'fulltag', h: m[1] });       // <span>text</span> or <a>text</a>
        else if (m[2]) atoms.push({ t: 'tag', h: m[2] });     // <br> or standalone
        else atoms.push({ t: 'char', h: m[3] });               // single char
      }

      let i = 0;
      const speed = 2; // ms per atom — peppy
      const fastSpeed = 0.3;

      function tick() {
        if (skipRequested) {
          codeEl.innerHTML = html;
          updateLines();
          return;
        }
        if (i >= atoms.length) {
          updateLines();
          showToast('✓ Click → or pick a file');
          return;
        }
        const a = atoms[i];
        if (a.t === 'fulltag') {
          // Render the full tag atomically so colors appear instantly
          codeEl.innerHTML += a.h;
        } else if (a.t === 'tag') {
          codeEl.innerHTML += a.h;
        } else {
          codeEl.innerHTML += a.h;
        }
        i++;
        updateLines();
        const sp = (a.t === 'char' && a.h === '\n') ? fastSpeed : speed;
        typingTimer = setTimeout(tick, sp);
      }
      tick();
    }

    function switchTab(name) {
      activeTab = name;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.sidebar-file').forEach(f => f.classList.toggle('active', f.dataset.tab === name));
      fileType.textContent = tabs[name].label;
      updateFlowHint();
      typewrite(tabs[name].html);
    }

    // Click handlers
    document.querySelectorAll('.tab').forEach(t =>
      t.addEventListener('click', () => switchTab(t.dataset.tab)));
    document.querySelectorAll('.sidebar-file').forEach(f =>
      f.addEventListener('click', () => switchTab(f.dataset.tab)));

    // Flow hint — go to next file
    flowHint.addEventListener('click', () => {
      const idx = tabOrder.indexOf(activeTab);
      if (idx < tabOrder.length - 1) {
        switchTab(tabOrder[idx + 1]);
      } else {
        switchTab(tabOrder[0]); // loop back
      }
    });

    // Click editor to skip animation
    editor.addEventListener('click', (e) => {
      if (e.target === editor || e.target === codeEl || e.target.classList.contains('code')) {
        if (!skipRequested) {
          skipRequested = true;
          clearTimeout(typingTimer);
          codeEl.innerHTML = tabs[activeTab].html;
          updateLines();
        }
      }
    });

    // Start
    switchTab('class');
  </script>
</body>
