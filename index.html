<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ronnit Roy Burman — Chat my Resume</title>
  <meta name="description" content="Chat with Ronnit Burman's resume. Software & Systems Engineer — 10+ years hardware-to-cloud.">
  <style>
    :root {
      --bg: #17181c; --sidebar-bg: #1a1b20; --user-bubble: #2a2b30;
      --assistant-bg: transparent; --border: #2e2f35;
      --text: #e8e8ed; --muted: #9d9da8; --subtle: #6b6b76;
      --accent: #6c8cff; --green: #4caf93; --purple: #b89fff;
      --orange: #f0a060; --red: #f06070;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
      background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;
      display:flex;height:100vh;overflow:hidden;
    }
    a{color:var(--accent);text-decoration:none}

    /* ── Sidebar ── */
    .sidebar{
      width:260px;min-width:260px;background:var(--sidebar-bg);
      border-right:1px solid var(--border);display:flex;flex-direction:column;
      padding:1.2rem;gap:1rem;overflow-y:auto;
    }
    .sidebar-name{font-weight:700;font-size:0.95rem}
    .sidebar-name span{color:var(--accent)}
    .sidebar-bio{font-size:0.8rem;color:var(--muted);line-height:1.5}
    .sidebar-stats{display:flex;flex-direction:column;gap:0.4rem}
    .sidebar-stat{font-size:0.8rem;color:var(--muted)}
    .sidebar-stat b{color:var(--accent)}
    .sidebar-links{display:flex;flex-direction:column;gap:0.3rem;font-size:0.82rem}
    .sidebar-links a{color:var(--muted);transition:color 0.2s}
    .sidebar-links a:hover{color:var(--text)}

    /* ── Main Chat ── */
    .main{flex:1;display:flex;flex-direction:column;min-width:0}

    /* Header */
    .chat-header{
      padding:0.7rem 1.2rem;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;font-weight:600;
      background:var(--sidebar-bg);
    }
    .online-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

    /* Messages */
    .messages{
      flex:1;overflow-y:auto;padding:1.5rem;
      display:flex;flex-direction:column;gap:1.2rem;
    }
    .msg{display:flex;gap:0.8rem;max-width:720px;animation:fadeIn 0.3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg-avatar{
      width:30px;height:30px;border-radius:6px;display:flex;align-items:center;
      justify-content:center;font-size:0.85rem;flex-shrink:0;
    }
    .msg-assistant .msg-avatar{background:rgba(108,140,255,0.15);color:var(--accent)}
    .msg-user .msg-avatar{background:rgba(240,160,96,0.15);color:var(--orange)}
    .msg-body{flex:1;line-height:1.65;font-size:0.9rem}
    .msg-user .msg-body{background:var(--user-bubble);padding:0.7rem 1rem;border-radius:12px;color:var(--text)}
    .msg-assistant .msg-body{padding:0.1rem 0}
    .msg-body h3{font-size:0.95rem;font-weight:700;margin:0.8rem 0 0.3rem;color:var(--accent)}
    .msg-body h3:first-child{margin-top:0}
    .msg-body ul{margin:0.3rem 0 0.3rem 1.2rem;color:var(--muted)}
    .msg-body ul li{margin-bottom:0.2rem}
    .msg-body .highlight{color:var(--green);font-weight:600}
    .msg-body .metric{color:var(--orange);font-weight:700}
    .msg-body .tag{
      display:inline-block;font-size:0.78rem;padding:0.15rem 0.6rem;border-radius:4px;
      margin:0.15rem 0.3rem 0.15rem 0;border:1px solid;
    }
    .tag-blue{color:var(--accent);border-color:rgba(108,140,255,0.3);background:rgba(108,140,255,0.06)}
    .tag-green{color:var(--green);border-color:rgba(76,175,147,0.3);background:rgba(76,175,147,0.06)}
    .tag-purple{color:var(--purple);border-color:rgba(184,159,255,0.3);background:rgba(184,159,255,0.06)}

    .typing-indicator{display:flex;gap:4px;padding:0.3rem 0}
    .typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--subtle);animation:typing 1.4s infinite}
    .typing-indicator span:nth-child(2){animation-delay:0.2s}
    .typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes typing{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

    /* Prompt chips */
    .prompts{
      padding:0.8rem 1.5rem 1rem;border-top:1px solid var(--border);
      display:flex;gap:0.5rem;flex-wrap:wrap;
    }
    .prompt-chip{
      font-size:0.8rem;padding:0.45rem 0.9rem;border-radius:20px;
      border:1px solid var(--border);background:transparent;color:var(--muted);
      cursor:pointer;transition:0.2s;white-space:nowrap;
    }
    .prompt-chip:hover{border-color:var(--accent);color:var(--text);background:rgba(108,140,255,0.04)}
    .prompt-chip.active{border-color:var(--accent);color:var(--accent);background:rgba(108,140,255,0.08)}

    .input-row{
      padding:0.5rem 1.5rem 1rem;display:flex;gap:0.6rem;
    }
    .msg-input{
      flex:1;padding:0.7rem 1rem;border-radius:10px;border:1px solid var(--border);
      background:var(--sidebar-bg);color:var(--text);font-size:0.85rem;
      font-family:inherit;outline:none;resize:none;
    }
    .msg-input:focus{border-color:var(--accent)}
    .msg-input::placeholder{color:var(--subtle)}
    .send-btn{
      padding:0.7rem 1.4rem;border-radius:10px;border:none;
      background:var(--accent);color:#fff;font-weight:600;cursor:pointer;
      font-size:0.85rem;transition:0.2s;
    }
    .send-btn:hover{opacity:0.88}

    @media(max-width:700px){
      .sidebar{display:none}
      .messages{padding:1rem}
      .msg-body{font-size:0.85rem}
    }
  </style>
</head>
<body>

    <div class="sidebar-links">
      <a href="mailto:ronnitburman@gmail.com">📧 ronnitburman@gmail.com</a>
      <a href="tel:+14379882357">📞 (437) 988-2357</a>
      <a href="https://linkedin.com/in/ronnitburman" target="_blank">🔗 LinkedIn</a>

  <!-- Chat -->
  <div class="main">
    <div class="chat-header">
      <span class="online-dot"></span> Ronnit's Resume <span style="color:var(--subtle);font-weight:400">— online</span>

    <div class="messages" id="messages">

    </div>

    <div class="prompts" id="prompts">
      <button class="prompt-chip active" data-prompt="overview">👋 Overview</button>
      <button class="prompt-chip" data-prompt="cisco">🔧 Cisco Experience</button>
      <button class="prompt-chip" data-prompt="skills">🛠 Skills</button>

  <script>

    const responses = {

  <li>Analyzed <span class="metric">50GB+</span> system-level datasets with Pandas & Google BigQuery</li>
  <li>Developed reusable modules mapping physical device states → applications</li>
</ul>`
      },
      johnson: {
        text: `<h3>⚡ Johnson Controls — Controls Systems Engineer</h3>
<p><span class="metric">Jul 2016 – Sep 2021</span> · New York, USA</p>
<ul>
  <li><span class="highlight">Invented Digital Integration Module</span> — <span class="metric">patent filed</span>. R2R bridge architecture designed from scratch, manufactured in Taiwan</li>
  <li><span class="metric">Slashed field wiring costs by 70%</span></li>

  <li>Forward-deployed with customers — translated ambiguous requirements into reliable integration strategies</li>
  <li>2 additional invention disclosures — defensive publications</li>
</ul>`
      },
      skills: {
        text: `<h3>🛠 Skills & Technologies</h3>
<p>
  <span class="tag tag-blue">Python</span><span class="tag tag-blue">Bash</span><span class="tag tag-blue">SQL</span>
  <span class="tag tag-green">Docker</span><span class="tag tag-green">Kubernetes</span><span class="tag tag-green">AWS</span><span class="tag tag-green">PostgreSQL</span><span class="tag tag-green">CI/CD</span><span class="tag tag-green">Git</span>
  <span class="tag tag-purple">Linux</span><span class="tag tag-purple">Arduino</span><span class="tag tag-purple">Raspberry Pi</span><span class="tag tag-purple">ESP32</span><span class="tag tag-purple">ATmega32</span>
  <span class="tag tag-green">UART</span><span class="tag tag-green">I²C</span><span class="tag tag-green">SPI</span><span class="tag tag-green">RS-232</span><span class="tag tag-green">JTAG</span>
  <span class="tag tag-blue">MATLAB Simulink</span><span class="tag tag-blue">Cadence</span><span class="tag tag-blue">P-SIM</span><span class="tag tag-blue">Schematics</span>
  <span class="tag tag-purple">Remote Debugging</span><span class="tag tag-purple">Bit Masking</span><span class="tag tag-purple">IoT Telemetry</span>
</p>
<p style="margin-top:0.8rem;color:var(--muted)"><span class="highlight">Hardware registers → cloud containers.</span> Since 2016.</p>`
      },
      education: {
        text: `<h3>🎓 Education</h3>
<ul>
  <li><span class="highlight">M.Eng, Systems Design Engineering — AI & ML</span><br><span style="color:var(--subtle)">University of Waterloo, 2022</span></li>
  <li style="margin-top:0.4rem"><span class="highlight">B.Tech, Electronics & Instrumentation</span><br><span style="color:var(--subtle)">Vellore Institute of Technology, 2016</span></li>
</ul>`
      },
      awards: {
        text: `<h3>🏆 Leadership & Awards</h3>
<ul>
  <li><span class="highlight">Founder & Captain — Hybrid Formula Student Team</span> (2013–15)<br>
  <span style="color:var(--muted)">Led 25-member team to win Best Innovation Challenge. Built auto gear shifter, RPM meter, MCP boards, 3D-printed housings — ahead of EV adoption.</span></li>
  <li style="margin-top:0.5rem"><span class="highlight">Winner — International Hackathon, Uganda</span><br>
  <span style="color:var(--muted)">Prototyped mechanical suction system saving lives during hospital power outages.</span></li>
  <li style="margin-top:0.5rem"><span class="highlight">President — Graduate Student Association</span>, SYDE, UWaterloo</li>
  <li style="margin-top:0.5rem"><span class="highlight">Dean's Award</span> — Extraordinary Performance, VIT</li>
</ul>`
      },
      contact: {
        text: `<h3>📬 Let's Connect</h3>
<p>I'm open to opportunities in <span class="highlight">software systems</span>, <span class="highlight">hardware-software integration</span>, and <span class="highlight">AI/ML engineering</span>.</p>
<p style="margin-top:0.5rem">📧 <a href="mailto:ronnitburman@gmail.com">ronnitburman@gmail.com</a><br>
📞 (437) 988-2357<br>
🔗 <a href="https://linkedin.com/in/ronnitburman" target="_blank">linkedin.com/in/ronnitburman</a><br>
💻 <a href="https://github.com/ronnitburman" target="_blank">github.com/ronnitburman</a></p>`
      }
    };

    // Follow-up suggestions per topic
    const followUps = {
      overview: [
        { label: '🔧 Cisco Experience', prompt: 'cisco' },
        { label: '🛠 Skills', prompt: 'skills' },
        { label: '🏆 Awards', prompt: 'awards' }
      ],
      cisco: [
        { label: '📊 Tyco (IoT)', prompt: 'tyco' },
        { label: '⚡ Johnson Controls', prompt: 'johnson' },
        { label: '🛠 Skills', prompt: 'skills' }
      ],
      tyco: [
        { label: '🔧 Cisco', prompt: 'cisco' },
        { label: '⚡ Johnson Controls', prompt: 'johnson' },
        { label: '🎓 Education', prompt: 'education' }
      ],
      johnson: [
        { label: '🔧 Cisco', prompt: 'cisco' },
        { label: '📊 Tyco (IoT)', prompt: 'tyco' },
        { label: '🏆 Awards', prompt: 'awards' }
      ],
      skills: [
        { label: '🔧 Cisco Experience', prompt: 'cisco' },
        { label: '🏆 Awards', prompt: 'awards' },
        { label: '📬 Contact', prompt: 'contact' }
      ],
      awards: [
        { label: '🎓 Education', prompt: 'education' },
        { label: '🛠 Skills', prompt: 'skills' },
        { label: '📬 Contact', prompt: 'contact' }
      ],
      education: [
        { label: '🛠 Skills', prompt: 'skills' },
        { label: '🔧 Cisco Experience', prompt: 'cisco' }
      ],
      contact: [
        { label: '👋 Overview', prompt: 'overview' },
        { label: '🛠 Skills', prompt: 'skills' }
      ]
    };

    function addMessage(role, html) {
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;
      const avatar = role === 'user' ? '👤' : '📄';
      div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-body">${html}</div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'msg msg-assistant';
      div.id = 'typing-msg';
      div.innerHTML = `<div class="msg-avatar">📄</div><div class="msg-body"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function removeTyping() {
      const t = document.getElementById('typing-msg');
      if (t) t.remove();
    }

    function addFollowUps(key) {
      const chips = followUps[key];
      if (!chips) return;
      const div = document.createElement('div');
      div.className = 'msg msg-assistant';
      div.style.marginTop = '-0.5rem';
      div.innerHTML = `<div class="msg-avatar"></div><div class="msg-body" style="display:flex;gap:0.4rem;flex-wrap:wrap">${chips.map(c => `<button class="prompt-chip" onclick="ask('${c.prompt}')">${c.label}</button>`).join('')}</div>`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function respond(key, userText) {
      if (userText) addMessage('user', `<p>${userText}</p>`);
      addTyping();
      setTimeout(() => {
        removeTyping();
        addMessage('assistant', responses[key].text);
        addFollowUps(key);
        // Highlight active chip
        document.querySelectorAll('.prompt-chip').forEach(c => c.classList.remove('active'));
        const chip = document.querySelector(`[data-prompt="${key}"]`);
        if (chip) chip.classList.add('active');
      }, 600 + Math.random() * 600);
    }

    function ask(key) {
      respond(key);
    }

    function sendMsg() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = '';

      // Simple keyword matching
      const t = text.toLowerCase();
      if (t.includes('cisco') || t.includes('network') || t.includes('ios-xe')) respond('cisco', text);
      else if (t.includes('tyco') || t.includes('iot') || t.includes('data sci') || t.includes('pipeline')) respond('tyco', text);
      else if (t.includes('johnson') || t.includes('control') || t.includes('wiring') || t.includes('patent')) respond('johnson', text);
      else if (t.includes('skill') || t.includes('tech') || t.includes('stack') || t.includes('tool')) respond('skills', text);
      else if (t.includes('award') || t.includes('leader') || t.includes('formula') || t.includes('hackathon')) respond('awards', text);
      else if (t.includes('education') || t.includes('school') || t.includes('degree') || t.includes('waterloo')) respond('education', text);
      else if (t.includes('contact') || t.includes('email') || t.includes('hire') || t.includes('connect')) respond('contact', text);
      else respond('overview', text);
    }

    // Prompt chips
    document.querySelectorAll('.prompt-chip').forEach(chip => {
      chip.addEventListener('click', () => ask(chip.dataset.prompt));
    });

    // Start with overview
    ask('overview');

    // Focus input
    msgInput.focus();
  </script>
</body>
</html>
